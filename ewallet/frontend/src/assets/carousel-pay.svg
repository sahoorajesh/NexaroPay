<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Pay illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="600" rx="34" fill="url(#bg)"/>
  <circle cx="120" cy="120" r="170" fill="#38bdf8" opacity="0.20" filter="url(#soft)"/>
  <circle cx="1070" cy="470" r="210" fill="#22c55e" opacity="0.14" filter="url(#soft)"/>
  <circle cx="1020" cy="130" r="120" fill="#a855f7" opacity="0.12" filter="url(#soft)"/>

  <!-- Phone -->
  <g transform="translate(430 92)">
    <rect x="0" y="0" width="340" height="416" rx="44" fill="#0b1222" opacity="0.88"/>
    <rect x="16" y="18" width="308" height="380" rx="34" fill="#f8fafc" opacity="0.92"/>
    <rect x="40" y="52" width="260" height="132" rx="22" fill="url(#card)" stroke="#94a3b8" stroke-opacity="0.22"/>
    <circle cx="78" cy="92" r="18" fill="#22c55e" opacity="0.26"/>
    <circle cx="128" cy="92" r="18" fill="#38bdf8" opacity="0.24"/>
    <circle cx="178" cy="92" r="18" fill="#a855f7" opacity="0.18"/>
    <rect x="66" y="124" width="208" height="12" rx="6" fill="#0f172a" opacity="0.14"/>
    <rect x="66" y="148" width="156" height="10" rx="5" fill="#0f172a" opacity="0.10"/>

    <!-- Buttons -->
    <g opacity="0.9">
      <circle cx="84" cy="238" r="22" fill="#e2e8f0"/>
      <path d="M84 227v22M73 238h22" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
      <circle cx="170" cy="238" r="22" fill="#e2e8f0"/>
      <path d="M170 249V227" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
      <path d="M162 236l8-9 8 9" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="256" cy="238" r="22" fill="#e2e8f0"/>
      <path d="M256 227v22" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
      <path d="M248 240l8 9 8-9" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- List rows -->
    <g opacity="0.85">
      <rect x="40" y="284" width="260" height="54" rx="16" fill="#eef2ff"/>
      <circle cx="68" cy="311" r="14" fill="#38bdf8" opacity="0.35"/>
      <rect x="92" y="302" width="126" height="10" rx="5" fill="#0f172a" opacity="0.12"/>
      <rect x="92" y="320" width="176" height="8" rx="4" fill="#0f172a" opacity="0.08"/>

      <rect x="40" y="350" width="260" height="54" rx="16" fill="#ecfeff"/>
      <circle cx="68" cy="377" r="14" fill="#22c55e" opacity="0.28"/>
      <rect x="92" y="368" width="142" height="10" rx="5" fill="#0f172a" opacity="0.12"/>
      <rect x="92" y="386" width="156" height="8" rx="4" fill="#0f172a" opacity="0.08"/>
    </g>
  </g>

  <!-- Security badge -->
  <g transform="translate(860 150)" opacity="0.92">
    <path d="M70 10l50 20v40c0 40-28 74-50 86C48 144 20 110 20 70V30l50-20Z" fill="#22c55e" opacity="0.20"/>
    <path d="M70 28l32 13v28c0 26-18 49-32 58C56 118 38 95 38 69V41l32-13Z" fill="#22c55e" opacity="0.26"/>
    <path d="M56 70l10 10 26-28" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

